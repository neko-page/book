<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>单文件阅读器</title>
  <style>
    :root { --bg:#f8f9fa; --text:#2c3e50; --toolbar:#fff; --border:#e2e8f0; --accent:#3b82f6; --fs:18px; }
    body.dark { --bg:#111827; --text:#e5e7eb; --toolbar:#1f2937; --border:#374151; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font:1.15rem/1.8 system-ui, sans-serif; transition:.3s; padding:16px; }
    .toolbar { position:fixed; top:0; left:0; right:0; background:var(--toolbar); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; z-index:100; }
    .title-input { background:transparent; border:none; border-bottom:1px dashed var(--border); color:var(--text); font-size:1.1rem; font-weight:600; width:220px; outline:none; padding:2px 4px; }
    .ctrl { display:flex; gap:6px; margin-left:auto; }
    button { background:transparent; border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; cursor:pointer; font-size:.85rem; transition:.2s; }
    button:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
    .content { max-width:760px; margin:60px auto 40px; white-space:pre-wrap; text-align:justify; padding:0 4px; min-height:60vh; }
    @media(max-width:600px) { .toolbar { flex-direction:column; align-items:stretch; } .ctrl { margin-left:0; justify-content:space-between; } }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="title" class="title-input" value="加载中..." />
    <div class="ctrl">
      <button id="font-down">A-</button>
      <button id="font-up">A+</button>
      <button id="theme">主题</button>
    </div>
  </div>
  <main id="content" class="content">正在加载配置文本...</main>
  <script>
    // === 配置区：在此修改文本直链与默认标题 ===
    const CONFIG = {
      url: 'txt.txt',
      defaultTitle: '全球指令技术下降一万倍而我不变'
    };
    // ============================================
    const $=id=>document.getElementById(id);
    let fs=parseInt(localStorage.getItem('r1-fs'))||18;

    function applySettings(){
      document.documentElement.style.setProperty('--fs', fs+'px');
      document.body.style.fontSize=fs+'px';
      if(localStorage.getItem('r1-theme')==='dark') document.body.classList.add('dark');
      $('title').value = localStorage.getItem('r1-title') || CONFIG.defaultTitle;
    }

    $('font-up').onclick=()=>{ if(fs<28) fs+=2; savePrefs(); };
    $('font-down').onclick=()=>{ if(fs>12) fs-=2; savePrefs(); };
    function savePrefs(){ localStorage.setItem('r1-fs', fs); document.body.style.fontSize=fs+'px'; }
    $('theme').onclick=()=>{
      document.body.classList.toggle('dark');
      localStorage.setItem('r1-theme', document.body.classList.contains('dark')?'dark':'light');
    };
    $('title').onchange=e=> localStorage.setItem('r1-title', e.target.value);

    async function loadContent(){
      $('content').textContent='加载中...';
      try{
        const res=await fetch(CONFIG.url);
        if(!res.ok) throw new Error('HTTP '+res.status);
        $('content').textContent=await res.text();
      }catch(e){
        $('content').textContent='加载失败：'+e.message+'\n\n请确保链接有效且服务器允许跨域(CORS)。';
      }
    }

    applySettings();
    loadContent();
  </script>
</body>
</html>
